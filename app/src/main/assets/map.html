<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    /* position:absolute + inset:0 garantit le remplissage quel que soit
       le mode de calcul de hauteur du WebView (100vh peut valoir 0 avec
       loadDataWithBaseURL sur certains chromium embarqués) */
    #map { position: absolute; inset: 0; }
  </style>
</head>
<body>
<div id="map"></div>
<script>
  // Fix Leaflet marker icon paths when loaded from CDN inside a WebView
  delete L.Icon.Default.prototype._getIconUrl;
  L.Icon.Default.mergeOptions({
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png'
  });

  var map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  // invalidateSize() immédiat + différé : couvre le cas où le layout WebView
  // n'est pas encore finalisé quand le script s'exécute
  window.addEventListener('load', function() {
    map.invalidateSize(false);
    setTimeout(function() { map.invalidateSize(false); }, 300);
  });
  window.addEventListener('resize', function() { map.invalidateSize(false); });

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  var marker = null;

  function placeMarker(lat, lng, label) {
    var latlng = L.latLng(lat, lng);
    if (marker) {
      marker.setLatLng(latlng);
    } else {
      marker = L.marker(latlng).addTo(map);
    }
    if (label) {
      marker.bindPopup(label).openPopup();
    }
  }

  // Called from Kotlin via evaluateJavascript
  function panTo(lat, lng, label) {
    map.setView([lat, lng], 13, { animate: true });
    placeMarker(lat, lng, label || null);
  }

  // User taps on map → Android does reverse geocoding
  map.on('click', function(e) {
    placeMarker(e.latlng.lat, e.latlng.lng, null);
    if (typeof Android !== 'undefined') {
      Android.onMapClick(e.latlng.lat, e.latlng.lng);
    }
  });
</script>
</body>
</html>
